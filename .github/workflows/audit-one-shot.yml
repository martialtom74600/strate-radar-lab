# Audit one-shot — une entreprise à la demande (workflow_dispatch uniquement).
# Le run nocturne (nightly-radar.yml) reste inchangé.

name: Audit one-shot

on:
  workflow_dispatch:
    inputs:
      business_name:
        description: 'Nom entreprise (tel que sur Google Maps)'
        required: true
        type: string
      location:
        description: 'Zone Places ex. Annecy, France'
        required: false
        type: string

concurrency:
  group: strate-radar-audit-one-shot
  cancel-in-progress: false

jobs:
  audit-one:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restaurer la SQLite
        uses: actions/cache@v4
        with:
          path: data/strate-radar.sqlite
          key: strate-radar-sqlite-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            strate-radar-sqlite-${{ github.ref_name }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Audit one-shot
        env:
          STRATE_RADAR_SIMULATION: 'false'
          NODE_ENV: production
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          RADAR_SEARCH_LOCATION: ${{ secrets.RADAR_SEARCH_LOCATION || vars.RADAR_SEARCH_LOCATION }}
          RADAR_CAMPAIGN_MODE: 'false'
          RADAR_TREND_DRIVEN: 'false'
          RADAR_USE_SEED_LIST: 'false'
          RADAR_VERBOSE: 'true'
          RADAR_INGEST_SECRET: ${{ secrets.RADAR_INGEST_SECRET }}
          RADAR_STUDIO_ORIGIN: ${{ vars.RADAR_STUDIO_ORIGIN || 'https://www.strate-studio.fr' }}
          RADAR_SERP_MAX_PAGES: '3'
          RADAR_MAX_PLACES_REQUESTS_PER_RUN: '30'
          RADAR_MAX_WEB_SEARCH_REQUESTS_PER_RUN: '10'
          AUDIT_TARGET_NAME: ${{ github.event.inputs.business_name }}
          AUDIT_TARGET_LOCATION: ${{ github.event.inputs.location }}
        run: npm run audit:one

      - name: Enregistrer la SQLite
        if: success() && hashFiles('data/strate-radar.sqlite') != ''
        uses: actions/cache@v4
        with:
          path: data/strate-radar.sqlite
          key: strate-radar-sqlite-${{ github.ref_name }}-${{ github.run_id }}

      - name: Artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-one-shot-${{ github.run_id }}
          retention-days: 90
          path: |
            rapport_matinal.md
            data/shadow-sites-export.json
            data/heartbeat.json

      - name: Notifier Telegram
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: npx tsx src/scripts/send-telegram-report.ts
