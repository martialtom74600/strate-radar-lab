# Prospection nocturne : rapport + export JSON (Shadow Site).
# Horaire : ~04h à Paris en hiver (UTC+1) — ajuster le cron si besoin (GitHub = UTC).

name: Nightly Strate Radar

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: strate-radar-nightly
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Exécuter Strate Radar (live)
        env:
          STRATE_RADAR_SIMULATION: 'false'
          NODE_ENV: production
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Var vide / absente → défaut (évite `""` qui cassait Zod sur le runner)
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          # Secret ou variable dépôt (beaucoup stockent la ville en secret — les deux passent).
          RADAR_SEARCH_LOCATION: ${{ secrets.RADAR_SEARCH_LOCATION || vars.RADAR_SEARCH_LOCATION }}
          RADAR_VERBOSE: 'false'
        run: npm run dev

      - name: Pousser rapport, export, shadow pages et SQLite
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Même chemin que STRATE_RADAR_DB_PATH par défaut (mémoire lieux / diamants entre les runs CI)
          git add rapport_matinal.md data/shadow-sites-export.json data/shadow-pages/
          if [ -f data/strate-radar.sqlite ]; then git add data/strate-radar.sqlite; fi
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore(radar): nightly rapport, export, shadow pages et SQLite"
            # Remote peut avoir avancé (push local / autre job) pendant le run ~6 min
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi

      - name: Notifier Telegram (succès)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram ignoré : définir les secrets TELEGRAM_BOT_TOKEN et TELEGRAM_CHAT_ID."
            exit 0
          fi
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          REPORT_URL="https://github.com/${REPO}/blob/${BRANCH}/rapport_matinal.md"
          COUNT=$(node -p "try { require('./data/shadow-sites-export.json').diamonds.length } catch (e) { 0 }" 2>/dev/null || echo 0)
          CITY=$(node -p "try { require('./data/shadow-sites-export.json').cityLabel || '—' } catch (e) { '—' }" 2>/dev/null || echo '—')
          MSG="$(printf '%s\n' "✅ Strate Radar — run OK" "Zone : ${CITY}" "Pépites (export) : ${COUNT}" "Rapport : ${REPORT_URL}")"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            | grep -q '"ok":true' || echo "Avertissement : envoi Telegram échoué (le run radar est OK)."

      - name: Notifier Telegram (échec)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then exit 0; fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ Strate Radar — échec du workflow. Logs : ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            || true