# Prospection nocturne : rapport Markdown + JSON export / ingest vitrine · pas de HTML local (pages côté site mère via API).
# Horaire : ~04h à Paris en hiver (UTC+1) — ajuster le cron si besoin (GitHub = UTC).
#
# Sorties `rapport_matinal.md`, `data/shadow-sites-export.json`, `data/heartbeat.json`, `data/strate-radar.sqlite`
# sont dans .gitignore : pas de commit depuis ce job (évite conflits avec les runs locaux). SQLite est mise en cache Actions.

name: Nightly Strate Radar

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: strate-radar-nightly
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Restaurer la SQLite (mémoire entre runs CI)
        uses: actions/cache@v4
        with:
          path: data/strate-radar.sqlite
          key: strate-radar-sqlite-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            strate-radar-sqlite-${{ github.ref_name }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Exécuter Strate Radar (live)
        env:
          STRATE_RADAR_SIMULATION: 'false'
          NODE_ENV: production
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          # Var vide / absente → défaut (évite `""` qui cassait Zod sur le runner)
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          # Groq sert encore : analyse conversion brochure (matrice Strate) + métier/villes en mode campagne.
          # (Les leviers de croissance sont générés côté serveur vitrine après ingest.)
          # Secret ou variable dépôt (beaucoup stockent la ville en secret — les deux passent).
          RADAR_SEARCH_LOCATION: ${{ secrets.RADAR_SEARCH_LOCATION || vars.RADAR_SEARCH_LOCATION }}
          # Campagne autonome (matrice villes | métiers Groq) — variables dépôt optionnelles
          RADAR_CAMPAIGN_MODE: ${{ vars.RADAR_CAMPAIGN_MODE || 'false' }}
          RADAR_CREATION_HUNT_MODE: ${{ vars.RADAR_CREATION_HUNT_MODE || 'true' }}
          RADAR_TARGET_CREATION_COUNT: ${{ vars.RADAR_TARGET_CREATION_COUNT || '5' }}
          RADAR_TARGET_REFONTE_COUNT: '0'
          RADAR_CREATION_HUNT_MIN_PER_NIGHT: ${{ vars.RADAR_CREATION_HUNT_MIN_PER_NIGHT || '5' }}
          RADAR_CREATION_HUNT_SECTORS_PER_ZONE: ${{ vars.RADAR_CREATION_HUNT_SECTORS_PER_ZONE || '6' }}
          RADAR_CREATION_HUNT_MAX_EXPANSIONS: ${{ vars.RADAR_CREATION_HUNT_MAX_EXPANSIONS || '4' }}
          RADAR_MAX_WEB_SEARCH_REQUESTS_PER_RUN: ${{ vars.RADAR_MAX_WEB_SEARCH_REQUESTS_PER_RUN || '120' }}
          RADAR_TREND_DRIVEN: 'false'
          TARGET_CITIES: ${{ vars.TARGET_CITIES }}
          # Région / département pour contraindre l'expansion Groq (ex. "Haute-Savoie")
          RADAR_GEO_REGION: ${{ vars.RADAR_GEO_REGION }}
          # Nuits sans création (toutes zones) avant blocklist auto d'un secteur (défaut 7)
          RADAR_CREATION_HUNT_STAGNANT_SECTOR_NIGHTS: ${{ vars.RADAR_CREATION_HUNT_STAGNANT_SECTOR_NIGHTS || '7' }}
          RADAR_VERBOSE: 'false'
          # Vitrine Strate Studio — POST https://www.strate-studio.fr/api/audits/ingest (même secret que la route Next)
          RADAR_INGEST_SECRET: ${{ secrets.RADAR_INGEST_SECRET }}
          RADAR_STUDIO_ORIGIN: ${{ vars.RADAR_STUDIO_ORIGIN || 'https://www.strate-studio.fr' }}
          # true ponctuellement : log du corps de réponse en cas d'échec ingest (diagnostic 500)
          RADAR_INGEST_DEBUG: ${{ vars.RADAR_INGEST_DEBUG || 'false' }}
        run: npm run dev

      - name: Commiter le snapshot Creation Hunt (survie cache miss)
        if: success() && hashFiles('data/creation-hunt-state.json') != ''
        run: |
          git config user.email "radar-bot@strate-studio.fr"
          git config user.name "Strate Radar Bot"
          git add data/creation-hunt-state.json
          git diff --cached --quiet || git commit -m "chore(radar): snapshot creation-hunt state [skip ci]"
          git push

      - name: Enregistrer la SQLite dans le cache Actions
        if: success() && hashFiles('data/strate-radar.sqlite') != ''
        uses: actions/cache@v4
        with:
          path: data/strate-radar.sqlite
          key: strate-radar-sqlite-${{ github.ref_name }}-${{ github.run_id }}

      - name: Artefacts rapport + export + heartbeat
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: radar-output-${{ github.run_id }}
          retention-days: 90
          path: |
            rapport_matinal.md
            data/shadow-sites-export.json
            data/heartbeat.json

      - name: Notifier Telegram
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          RADAR_HEARTBEAT_PATH: data/heartbeat.json
          RADAR_REPORT_PATH: rapport_matinal.md
        run: npx tsx src/scripts/send-telegram-report.ts
