# Prospection nocturne : rapport Markdown + JSON export / ingest vitrine · pas de HTML local (pages côté site mère via API).
# Horaire : ~04h à Paris en hiver (UTC+1) — ajuster le cron si besoin (GitHub = UTC).
#
# Sorties `rapport_matinal.md`, `data/shadow-sites-export.json`, `data/heartbeat.json`, `data/strate-radar.sqlite`
# sont dans .gitignore : pas de commit depuis ce job (évite conflits avec les runs locaux). SQLite est mise en cache Actions.

name: Nightly Strate Radar

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: strate-radar-nightly
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restaurer la SQLite (mémoire entre runs CI)
        uses: actions/cache@v4
        with:
          path: data/strate-radar.sqlite
          key: strate-radar-sqlite-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            strate-radar-sqlite-${{ github.ref_name }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Exécuter Strate Radar (live)
        env:
          STRATE_RADAR_SIMULATION: 'false'
          NODE_ENV: production
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Var vide / absente → défaut (évite `""` qui cassait Zod sur le runner)
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          # Secret ou variable dépôt (beaucoup stockent la ville en secret — les deux passent).
          RADAR_SEARCH_LOCATION: ${{ secrets.RADAR_SEARCH_LOCATION || vars.RADAR_SEARCH_LOCATION }}
          # Campagne autonome (matrice villes | métiers Groq) — variables dépôt optionnelles
          RADAR_CAMPAIGN_MODE: ${{ vars.RADAR_CAMPAIGN_MODE || 'false' }}
          TARGET_CITIES: ${{ vars.TARGET_CITIES }}
          RADAR_VERBOSE: 'false'
          # Vitrine Strate Studio — POST https://www.strate-studio.fr/api/audits/ingest (même secret que la route Next)
          RADAR_INGEST_SECRET: ${{ secrets.RADAR_INGEST_SECRET }}
          RADAR_STUDIO_ORIGIN: ${{ vars.RADAR_STUDIO_ORIGIN || 'https://www.strate-studio.fr' }}
          # true ponctuellement : log du corps de réponse en cas d'échec ingest (diagnostic 500)
          RADAR_INGEST_DEBUG: ${{ vars.RADAR_INGEST_DEBUG || 'false' }}
        run: npm run dev

      - name: Enregistrer la SQLite dans le cache Actions
        if: success() && hashFiles('data/strate-radar.sqlite') != ''
        uses: actions/cache@v4
        with:
          path: data/strate-radar.sqlite
          key: strate-radar-sqlite-${{ github.ref_name }}-${{ github.run_id }}

      - name: Artefacts rapport + export + heartbeat
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: radar-output-${{ github.run_id }}
          retention-days: 90
          path: |
            rapport_matinal.md
            data/shadow-sites-export.json
            data/heartbeat.json

      - name: Notifier Telegram (succès)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram ignoré : définir les secrets TELEGRAM_BOT_TOKEN et TELEGRAM_CHAT_ID."
            exit 0
          fi
          COUNT=$(node -p "try { require('./data/shadow-sites-export.json').diamonds.length } catch (e) { 0 }" 2>/dev/null || echo 0)
          CITY=$(node -p "try { require('./data/shadow-sites-export.json').cityLabel || '—' } catch (e) { '—' }" 2>/dev/null || echo '—')
          MSG=$'✅ Strate Radar — run OK\nZone : '"${CITY}"
          if [ -f data/heartbeat.json ]; then
            CAMP_LINE=$(node -p "try { const h=require('./data/heartbeat.json'); (h.campaign && h.campaign.city && h.campaign.category) ? ('Campagne (ville × métier) : '+h.campaign.city+' × '+h.campaign.category) : '' } catch (e) { '' }" 2>/dev/null || echo "")
            RUN_DIA=$(node -p "try { const h=require('./data/heartbeat.json'); const parts=[]; if (typeof h.creationsFound==='number' && typeof h.targetCreationCount==='number') parts.push('Création '+h.creationsFound+'/'+h.targetCreationCount); if (typeof h.refontesFound==='number' && typeof h.targetRefonteCount==='number') parts.push('Refonte '+h.refontesFound+'/'+h.targetRefonteCount); if (typeof h.diamondsFound==='number' && parts.length) parts.push('Total leads '+h.diamondsFound); parts.length?parts.join(' · '):'' } catch (e) { '' }" 2>/dev/null || echo "")
            SCAN_LINE=$(node -p "try { const h=require('./data/heartbeat.json'); const parts=[]; if (typeof h.totalBusinessesScanned==='number') parts.push('Fiches parcourues : '+h.totalBusinessesScanned); if (typeof h.placesRequestsUsed==='number' && typeof h.placesRequestsMax==='number') parts.push('Requêtes Places : '+h.placesRequestsUsed+'/'+h.placesRequestsMax); parts.length?parts.join(' · '):'' } catch (e) { '' }" 2>/dev/null || echo "")
            STOP_LINE=$(node -p "try { const h=require('./data/heartbeat.json'); (h.placesStoppedEarly===true) ? '⚠️ Places : run interrompu (quota / 429 — résultats partiels)' : '' } catch (e) { '' }" 2>/dev/null || echo "")
            HB_AT=$(node -p "try { const h=require('./data/heartbeat.json'); h.lastRunIso ? ('Run (UTC) : '+h.lastRunIso) : '' } catch (e) { '' }" 2>/dev/null || echo "")
            [ -n "${CAMP_LINE}" ] && MSG="${MSG}"$'\n'"${CAMP_LINE}"
            [ -n "${RUN_DIA}" ] && MSG="${MSG}"$'\n'"${RUN_DIA}"
            [ -n "${SCAN_LINE}" ] && MSG="${MSG}"$'\n'"${SCAN_LINE}"
            [ -n "${STOP_LINE}" ] && MSG="${MSG}"$'\n'"${STOP_LINE}"
            [ -n "${HB_AT}" ] && MSG="${MSG}"$'\n'"${HB_AT}"
          fi
          MSG="${MSG}"$'\n'"Leads (export JSON) : ${COUNT}"$'\n'"Run / artefacts : ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            | grep -q '"ok":true' || echo "Avertissement : envoi Telegram échoué (le run radar est OK)."

      - name: Notifier Telegram (échec)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then exit 0; fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ Strate Radar — échec du workflow. Logs : ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            || true
